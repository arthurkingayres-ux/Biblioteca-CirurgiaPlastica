<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAF7F2">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Briefing Pré-Op">
  <title>Briefing Pré-Op — Cirurgia Plástica</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation bar -->
  <nav id="navbar">
    <button id="btn-back" class="nav-btn hidden" aria-label="Voltar">&#8592;</button>
    <h1 id="nav-title">Briefing Pré-Op</h1>
    <button id="btn-chat" class="nav-btn" aria-label="Chat IA">&#9993;</button>
  </nav>

  <!-- Home screen: procedure list -->
  <div id="screen-home" class="screen">
    <div class="search-container">
      <input type="search" id="procedure-filter" placeholder="Buscar procedimento..." autocomplete="off">
    </div>
    <div id="procedure-list"></div>
  </div>

  <!-- Briefing screen -->
  <div id="screen-briefing" class="screen hidden"></div>

  <!-- Chat screen -->
  <div id="screen-chat" class="screen hidden">
    <div id="chat-messages"></div>
    <div id="chat-offline" class="chat-offline hidden">Sem conexão — chat indisponível offline</div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="Pergunte sobre cirurgia..." autocomplete="off">
      <button id="btn-send" aria-label="Enviar">&#10148;</button>
    </div>
  </div>

  <script src="search.js"></script>
  <script src="renderer.js"></script>
  <script src="preop.js"></script>
  <script src="chat.js"></script>
  <script src="app.js"></script>
</body>
</html>
