name: Varredura Semanal de Artigos

on:
  schedule:
    # Toda segunda-feira as 08:00 UTC (05:00 Brasilia)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      area:
        description: 'Area especifica (deixe vazio para rotacao automatica)'
        required: false
        default: ''
      skip_triage:
        description: 'Pular triagem IA'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  varredura:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests python-dotenv anthropic

      - name: Executar varredura
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.area }}" ]; then
            ARGS="$ARGS --area ${{ github.event.inputs.area }}"
          fi
          if [ "${{ github.event.inputs.skip_triage }}" = "true" ]; then
            ARGS="$ARGS --skip-triage"
          fi
          python tools/varredura_semanal.py $ARGS

      - name: Push resultados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push || echo "Nada para push"
